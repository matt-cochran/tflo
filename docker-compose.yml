services:
  dev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspaces/tflo
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspaces/tflo/target
    working_dir: /workspaces/tflo
    stdin_open: true
    tty: true
    command: bash

volumes:
  cargo-cache:
  target-cache:

